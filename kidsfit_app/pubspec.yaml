name: kidsfit
description: KidsFit 小勇士 - 儿童AI运动健康App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # 网络请求
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1

  # 路由
  go_router: ^13.0.1

  # AI/ML - Google ML Kit骨骼检测
  google_mlkit_pose_detection: ^0.11.0
  camera: ^0.10.5+9
  permission_handler: ^11.1.0

  # 传感器和定位
  sensors_plus: ^4.0.2
  geolocator: ^10.1.0

  # 语音合成
  flutter_tts: ^3.8.5

  # 通知推送
  flutter_local_notifications: ^16.2.0

  # UI组件
  fl_chart: ^0.65.0
  flutter_svg: ^2.0.9+1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # 工具类
  uuid: ^4.2.1
  intl: ^0.20.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/badges/
    - assets/avatars/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
