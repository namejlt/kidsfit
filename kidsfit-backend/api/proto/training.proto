syntax = "proto3";
package training;
option go_package = "github.com/kidsfit/api/api/proto/training";

// TrainingService 训练服务，提供运动记录查询、个人最佳和记录创建能力
service TrainingService {
  // GetExerciseRecord 根据ID获取运动记录
  rpc GetExerciseRecord(GetExerciseRecordRequest) returns (GetExerciseRecordResponse);
  // GetPersonalBest 获取个人最佳成绩
  rpc GetPersonalBest(GetPersonalBestRequest) returns (GetPersonalBestResponse);
  // CreateExerciseRecord 创建运动记录
  rpc CreateExerciseRecord(CreateExerciseRecordRequest) returns (CreateExerciseRecordResponse);
}

// GetExerciseRecordRequest 获取运动记录的请求
message GetExerciseRecordRequest { string id = 1; }

// GetExerciseRecordResponse 获取运动记录的响应
message GetExerciseRecordResponse { ExerciseRecordInfo record = 1; }

// ExerciseRecordInfo 运动记录信息
message ExerciseRecordInfo { string id = 1; string user_id = 2; string type = 3; int32 duration_seconds = 4; int32 count = 5; int32 score = 6; }

// GetPersonalBestRequest 获取个人最佳的请求
message GetPersonalBestRequest { string user_id = 1; string exercise_type = 2; }

// GetPersonalBestResponse 获取个人最佳的响应
message GetPersonalBestResponse { int32 best_score = 1; int32 best_count = 2; }

// CreateExerciseRecordRequest 创建运动记录的请求
message CreateExerciseRecordRequest { string user_id = 1; string type = 2; int32 duration_seconds = 3; int32 count = 4; int32 score = 5; }

// CreateExerciseRecordResponse 创建运动记录的响应
message CreateExerciseRecordResponse { string id = 1; int32 points_earned = 2; bool is_record_broken = 3; }
