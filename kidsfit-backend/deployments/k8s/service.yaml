---
# -------------------- API 网关 Service --------------------
# 网关作为集群内唯一的入口服务，Ingress 将流量转发至此
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: kidsfit
  labels:
    app: kidsfit
    service: gateway
spec:
  type: ClusterIP
  selector:
    app: kidsfit
    service: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
