---
# -------------------- 激励服务 Service --------------------
apiVersion: v1
kind: Service
metadata:
  name: reward-svc
  namespace: kidsfit
  labels:
    app: kidsfit
    service: reward-svc
spec:
  type: ClusterIP
  selector:
    app: kidsfit
    service: reward-svc
  ports:
    - name: http
