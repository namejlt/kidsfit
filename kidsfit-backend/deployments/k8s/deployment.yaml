  replicas: 2
  selector:
    matchLabels:
      app: kidsfit
      service: gateway
  template:
    metadata:
      labels:
        app: kidsfit
        service: gateway
    spec:
      containers:
        - name: gateway
          image: kidsfit/gateway:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: KIDSFIT_SERVER_PORT
